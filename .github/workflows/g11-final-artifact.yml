name: G11 Final Artifact

on:
  push:
    branches:
      - g11-artifact-build-20260718
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-g11-final:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Exclude empty init files from generated patch hunks
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/build_g11_final.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('if path.is_file())', 'if path.is_file() and path.stat().st_size > 0)')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Build and validate G11 return
        id: build
        continue-on-error: true
        run: python tools/build_g11_final.py
      - name: Upload single FINAL ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TIAI_G11_TRAINING_OVERNIGHT_TABPFN_FINAL_20260718
          path: dist/TIAI_G11_TRAINING_OVERNIGHT_TABPFN_FINAL_20260718/*
          if-no-files-found: error
          compression-level: 6
          retention-days: 7
      - name: Propagate validation failure
        if: steps.build.outcome != 'success'
        run: exit 1
